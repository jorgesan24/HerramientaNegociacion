<section class="panel-archivo">

    <!-- CAMBIO CLAVE: Quitamos la clase 'card' genérica y dejamos solo nombres únicos -->
    <div class="tarjeta-subida-exclusiva archivo-card">

        <div class="archivo-label">
            Negociación cargada:
        </div>

        <div class="archivo-info">
            <div class="archivo-nombre">
                <img
                    src="{{ url_for('static', filename='img/excel.png') }}"
                    class="icono-excel"
                    alt="Excel">

                <span class="texto-archivo">
                    {% if archivo_nombre %}
                        {{ archivo_nombre }}
                    {% else %}
                        Ningún archivo seleccionado
                    {% endif %}
                </span>

                {% if archivo_nombre %}
                    <span class="archivo-ok">✔</span>
                {% endif %}
            </div>
        </div>

        <form
            method="POST"
            enctype="multipart/form-data"
            class="form-cambiar">

            <label class="btn-secundario">
                Cambiar archivo
                
                <!-- CORRECCIÓN CLAVE: Agregamos una pausa de 150ms nativa para estabilizar el archivo en móviles -->
                <input
                    type="file"
                    name="archivo"
                    id="archivoExcelNegociacion"
                    accept=".xlsx,.xls"
                    hidden
                    onchange="setTimeout(() => { this.form.submit(); }, 150);">
            </label>

        </form>

    </div>

</section>
